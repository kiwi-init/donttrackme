<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="popup.css">
    <script type="module" src="popup.js"></script>
</head>
<body>
    <div id="setup" hidden>
        <h1>How should we handle trackers?</h1>
        <p class="subtitle">When sites add tracking parameters like <code>fbclid</code> or <code>gclid</code> to your URLs, we can either strip them or scramble them.</p>
        <button class="mode-btn" data-mode="remove">
            <span class="title">Remove</span>
            <span class="desc">Strip trackers out entirely. Cleanest, but a few affiliate links may break.</span>
        </button>
        <button class="mode-btn" data-mode="mask">
            <span class="title">Mask</span>
            <span class="desc">Keep the param but scramble its value. Less likely to break sites.</span>
        </button>
        <p class="hint">You can change this any time.</p>
    </div>

    <div id="main" hidden>
        <header>
            <strong>don't track me</strong>
            <label class="switch">
                <input type="checkbox" id="enabled-toggle">
                <span class="slider"></span>
            </label>
        </header>
        <div class="stat">
            <span class="num" id="cleaned-count">0</span>
            <span class="label">trackers neutralized</span>
        </div>
        <p class="status" id="status-line"></p>
        <div class="mode-switch">
            <span class="mode-label">Mode</span>
            <div class="seg">
                <button data-mode="remove" id="seg-remove">Remove</button>
                <button data-mode="mask" id="seg-mask">Mask</button>
            </div>
        </div>
    </div>
</body>
</html>
